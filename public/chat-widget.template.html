<template id="tech-fa-chat-widget-template">
    <div id="tech-fa-chat-widget">
        <div id="tech-fa-chat-box" data-open="false" aria-hidden="true">
            <div class="chat-header">
                <div class="chat-header-title">
                    <span class="chat-avatar" data-ai-avatar>AI</span>
                    <span data-ai-name>Chat Support</span>
                </div>
                <button type="button" data-chat-close aria-label="Close chat">✕</button>
            </div>
            <div class="chat-body">
                <div class="chat-messages" data-chat-messages>
                    <div class="chat-empty" data-chat-empty>Open chat to connect...</div>
                </div>
                <!-- <div class="chat-meta" data-api-status>status: idle</div> -->
            </div>
            <form class="chat-composer" data-chat-form>
                <textarea
                    data-chat-input
                    rows="2"
                    autocomplete="off"
                    placeholder="Type your message..."
                ></textarea>
                <button type="submit" class="chat-send" aria-label="Send message">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </div>
        <button id="tech-fa-chat-toggle" type="button" aria-label="Toggle chat">💬</button>
    </div>
</template>
