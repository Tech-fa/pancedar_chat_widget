name: Deploy chat widget to S3

on:
  push:
    branches: [main]
    paths:
      - "pancedar_chat_widget/**"
      - ".github/workflows/pancedar-chat-widget.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: pancedar_chat_widget

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build
        env:
          VITE_CHAT_WIDGET_TEMPLATE_HOST: ${{ vars.VITE_CHAT_WIDGET_TEMPLATE_HOST }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Push to S3 and invalidate CloudFront
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws s3 sync dist "s3://${S3_BUCKET}"
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
